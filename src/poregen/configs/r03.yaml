# PoreGen VAE — R03
#
# R03 = ConvVAE3D no-attention + split_v2 estratificado + KL corregido.

model:
  name: conv_noattn
  z_channels: 8
  base_channels: 32
  n_blocks: 2
  patch_size: 64

loss:
  xct_loss_type: charbonnier
  xct_weight: 1.0
  mask_bce_weight: 1.0
  mask_bce_pos_weight: 17.16
  mask_dice_weight: 1.0
  use_tversky: true
  tversky_alpha: 0.3
  tversky_beta: 0.7
  kl_free_bits: 0.25
  kl_warmup_steps: 4000
  kl_max_beta: 0.05

training:
  seed: 42
  lr: 2.0e-4
  weight_decay: 0.01
  total_steps: 71690
  max_grad_norm: 1.0
  scheduler: none
  lr_min: 2.0e-5
  warmup_steps: 0
  log_every: 1
  eval_every: 62
  val_batches: 20
  test_every: 625
  test_batches: 20
  save_every: 1000
  image_log_every: 62
  montecarlo_every: 100
  montecarlo_batch_size: 8
  final_full_eval: true
  sample_every: 12500
  n_patch_samples: 8

data:
  split_version: v2
  batch_size: 128
  num_workers: 4
  pin_memory: true
